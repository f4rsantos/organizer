name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        working-directory: organizador
        run: npm ci

      - name: Build
        working-directory: organizador
        env:
          VITE_PRESETS_FIREBASE_API_KEY: ${{ secrets.VITE_PRESETS_FIREBASE_API_KEY }}
          VITE_PRESETS_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_PRESETS_FIREBASE_AUTH_DOMAIN }}
          VITE_PRESETS_FIREBASE_PROJECT_ID: ${{ secrets.VITE_PRESETS_FIREBASE_PROJECT_ID }}
          VITE_PRESETS_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_PRESETS_FIREBASE_STORAGE_BUCKET }}
          VITE_PRESETS_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_PRESETS_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_PRESETS_FIREBASE_APP_ID: ${{ secrets.VITE_PRESETS_FIREBASE_APP_ID }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: organizador/dist

      - uses: actions/deploy-pages@v4
        id: deployment
